name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: rivet-dev
  CONTAINER_NAME: rivet-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd application
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Get Auto Scaling Group name
        id: get-asg
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query "AutoScalingGroups[?Tags[?Key=='Project' && Value=='rivet'] && Tags[?Key=='Environment' && Value=='dev']].AutoScalingGroupName" \
            --output text)
          echo "asg_name=$ASG_NAME" >> $GITHUB_OUTPUT

      - name: Trigger instance refresh
        env:
          ASG_NAME: ${{ steps.get-asg.outputs.asg_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Check if there's already an instance refresh in progress
          EXISTING_STATUS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name $ASG_NAME \
            --query 'InstanceRefreshes[0].Status' \
            --output text 2>/dev/null || echo "None")
          
          if [ "$EXISTING_STATUS" = "InProgress" ] || [ "$EXISTING_STATUS" = "Pending" ]; then
            echo "⚠️  Instance refresh already in progress"
            echo "Status: $EXISTING_STATUS"
            echo ""
            echo "The previous deployment is still running."
            echo "This is normal - the new image will be used when the current refresh completes."
            echo ""
            echo "Current refresh will continue with the latest image from ECR."
            exit 0
          fi
          
          # Start instance refresh for zero-downtime deployment
          echo "Starting instance refresh for zero-downtime deployment..."
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --preferences '{
              "MinHealthyPercentage": 90,
              "InstanceWarmup": 300,
              "CheckpointPercentages": [50, 100],
              "CheckpointDelay": 300
            }'
          
          echo "✓ Instance refresh started for ASG: $ASG_NAME"
          echo "New instances will pull image: $IMAGE_TAG"

      - name: Monitor deployment status
        env:
          ASG_NAME: ${{ steps.get-asg.outputs.asg_name }}
        run: |
          echo "Instance refresh started successfully!"
          echo "Checking initial status..."
          
          # Check status a few times to ensure it started properly
          for i in {1..3}; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name $ASG_NAME \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            
            PERCENT=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name $ASG_NAME \
              --query 'InstanceRefreshes[0].PercentageComplete' \
              --output text)
            
            echo "Status: $STATUS | Progress: $PERCENT%"
            
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "✗ Deployment failed with status: $STATUS"
              exit 1
            fi
            
            if [ "$STATUS" = "Successful" ]; then
              echo "✓ Deployment completed successfully!"
              exit 0
            fi
            
            sleep 10
          done
          
          echo ""
          echo "✓ Deployment is in progress and healthy"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "The deployment will continue in the background."
          echo "Estimated completion time: 25-40 minutes"
          echo ""
          echo "Monitor progress with:"
          echo "  aws autoscaling describe-instance-refreshes \\"
          echo "    --auto-scaling-group-name $ASG_NAME \\"
          echo "    --max-records 1"
          echo ""
          echo "The deployment will complete automatically."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deployment summary
        if: success()
        run: |
          echo "🚀 Deployment Summary"
          echo "===================="
          echo "Image: ${{ steps.build-image.outputs.image }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Deployed by: ${{ github.actor }}"
